name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    name: Python (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync deps
        run: uv sync --all-extras --dev

      - name: Ruff lint
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy content_stack

      - name: Pytest
        run: uv run pytest -v

      # M3: live MCP smoke. Boots the daemon in the background and
      # exercises the JSON-RPC POST surface against ``meta.enums`` to
      # confirm the Streamable HTTP transport is wired and the lowlevel
      # ``Server.run`` lifespan + tool dispatch round-trip cleanly. A
      # broken mount or registration-time discipline failure surfaces
      # here as a non-zero exit.
      - name: MCP smoke
        run: |
          set -euo pipefail
          uv run python -m content_stack serve --host 127.0.0.1 --port 5189 &
          DAEMON_PID=$!
          # Give the daemon a beat to bind the port + finish startup.
          sleep 3
          token="$(cat ~/.local/state/content-stack/auth.token)"
          # initialize.
          curl -fsS -X POST http://127.0.0.1:5189/mcp \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/json, text/event-stream" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"i","method":"initialize","params":{"protocolVersion":"2025-03-26","capabilities":{},"clientInfo":{"name":"ci","version":"0.1"}}}' \
            > /tmp/init.json
          # tools/call meta.enums.
          curl -fsS -X POST http://127.0.0.1:5189/mcp \
            -H "Authorization: Bearer ${token}" \
            -H "Accept: application/json, text/event-stream" \
            -H "Content-Type: application/json" \
            -d '{"jsonrpc":"2.0","id":"e","method":"tools/call","params":{"name":"meta.enums","arguments":{}}}' \
            > /tmp/enums.json
          # Assert the response contains the topics_status enum (proves
          # the dispatcher round-tripped the structured result).
          grep -q "topics_status" /tmp/enums.json
          kill "${DAEMON_PID}"

  ui:
    name: UI (typecheck, build, bundle-parity, gen-types-parity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync Python deps
        run: uv sync --all-extras --dev

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml

      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile

      - name: Type-check UI
        working-directory: ui
        run: pnpm type-check

      - name: Lint UI
        working-directory: ui
        run: pnpm lint

      - name: Build UI
        working-directory: ui
        run: pnpm build

      # Per D8: content_stack/ui_dist/ is committed (no pnpm at user install).
      # If the build produces output that differs from the committed bundle,
      # the PR has drifted — fail so the author rebuilds and commits.
      - name: Verify committed ui_dist matches build
        run: |
          if ! git diff --exit-code -- content_stack/ui_dist; then
            echo "::error::content_stack/ui_dist/ does not match \`pnpm build\` output"
            echo "Run \`make build-ui\` locally and commit the result."
            exit 1
          fi

      # M2: ui/src/api.ts is auto-generated from the daemon's OpenAPI spec.
      # Boot the daemon, regenerate types, diff against the committed copy.
      # Any PR that changes the API surface MUST commit the regenerated types.
      - name: Regenerate types from OpenAPI
        run: bash scripts/gen-types.sh

      - name: Verify committed ui/src/api.ts matches OpenAPI
        run: |
          if ! git diff --exit-code -- ui/src/api.ts; then
            echo "::error::ui/src/api.ts does not match the daemon OpenAPI spec"
            echo "Run \`make gen-types\` locally and commit the result."
            exit 1
          fi

  ui-unit:
    name: UI unit tests (vitest + jsdom)
    runs-on: ubuntu-latest
    needs: ui
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: Vitest
        working-directory: ui
        run: pnpm test

  ui-e2e:
    name: UI E2E (Playwright + axe + responsive screenshots)
    runs-on: ubuntu-latest
    needs: ui
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Sync Python deps
        run: uv sync --all-extras --dev
      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 10
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: ui/pnpm-lock.yaml
      - name: Install UI deps
        working-directory: ui
        run: pnpm install --frozen-lockfile
      - name: Install Playwright browsers
        working-directory: ui
        run: pnpm exec playwright install --with-deps chromium
      - name: Run E2E (spawns daemon on :5181, axe, screenshots, console-error gate)
        working-directory: ui
        run: pnpm e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            ui/playwright/.pw-html-report
            ui/playwright/.pw-results
            ui/playwright/screenshots
          retention-days: 14
