[alembic]
script_location = content_stack/db/migrations
prepend_sys_path = .
version_path_separator = os
# `sqlalchemy.url` is intentionally omitted: env.py resolves the URL from
# Settings.db_path so a single source of truth wins.

[post_write_hooks]
# Optional ruff format on autogenerated migrations once we have a schema (M1).
# Disabled in M0 to keep the toolchain minimal.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
