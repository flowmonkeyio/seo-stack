<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-surface);color:var(--color-fg-default);font-size:11px}.b{display:inline-flex;align-items:center;gap:4px;height:20px;padding:0 6px;font-size:11px;font-weight:500;border-radius:2px;line-height:1;margin:2px 4px 2px 0}.dot{width:6px;height:6px;border-radius:50%;display:inline-block}h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-fg-subtle);margin:0 0 6px;font-weight:600}.grp{margin-bottom:10px}@keyframes p{50%{opacity:.4}}</style></head><body>
<div class="grp"><h3>Article</h3>
<span class="b" style="background:var(--color-neutral-subtle);color:var(--color-neutral-fg)">Brief</span>
<span class="b" style="background:var(--color-info-subtle);color:var(--color-info-fg)">Outline</span>
<span class="b" style="background:var(--color-info-subtle);color:var(--color-info-fg)"><span class="dot" style="background:var(--color-info-default);animation:p 1.5s infinite"></span>Drafting</span>
<span class="b" style="background:var(--color-warning-subtle);color:var(--color-warning-fg)"><span class="dot" style="background:var(--color-warning-default)"></span>In review</span>
<span class="b" style="background:var(--color-success-subtle);color:var(--color-success-fg)">Approved</span>
<span class="b" style="background:var(--color-success-subtle);color:var(--color-success-fg)">Published</span>
<span class="b" style="background:var(--color-danger-subtle);color:var(--color-danger-fg)">Failed</span>
</div>
<div class="grp"><h3>Run</h3>
<span class="b" style="background:var(--color-neutral-subtle);color:var(--color-neutral-fg)">Queued</span>
<span class="b" style="background:var(--color-info-subtle);color:var(--color-info-fg)"><span class="dot" style="background:var(--color-info-default);animation:p 1.5s infinite"></span>Running</span>
<span class="b" style="background:var(--color-success-subtle);color:var(--color-success-fg)">Succeeded</span>
<span class="b" style="background:var(--color-danger-subtle);color:var(--color-danger-fg)">Failed</span>
<span class="b" style="background:var(--color-warning-subtle);color:var(--color-warning-fg)">Partial</span>
<span class="b" style="background:var(--color-neutral-subtle);color:var(--color-neutral-fg)">Canceled</span>
</div>
<div class="grp"><h3>EEAT verdict</h3>
<span class="b" style="background:var(--color-neutral-subtle);color:var(--color-neutral-fg)">Unevaluated</span>
<span class="b" style="background:var(--color-danger-subtle);color:var(--color-danger-fg)">Failing</span>
<span class="b" style="background:var(--color-warning-subtle);color:var(--color-warning-fg)">Marginal</span>
<span class="b" style="background:var(--color-eeat-subtle);color:var(--color-eeat-fg)">Passing</span>
<span class="b" style="background:var(--color-eeat-subtle);color:var(--color-eeat-fg)">Exemplary</span>
</div>
</body></html>
