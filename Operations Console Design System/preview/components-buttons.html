<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-surface);color:var(--color-fg-default);font-size:13px}.ctl{display:inline-flex;align-items:center;justify-content:center;font-weight:500;line-height:1;border-radius:4px;font-size:13px;height:32px;padding:0 12px;gap:8px;border:1px solid var(--color-border-default);background:var(--color-bg-surface);color:var(--color-fg-default);cursor:pointer}.ctl--primary{background:var(--color-accent-primary);border-color:var(--color-accent-primary);color:var(--color-fg-on-accent)}.ctl--ghost{background:transparent;border-color:transparent}.ctl--danger{background:var(--color-danger-default);border-color:var(--color-danger-default);color:var(--color-fg-on-accent)}.ctl--sm{height:28px;padding:0 10px}.ctl--lg{height:40px;padding:0 16px;font-size:14px}.row{display:flex;gap:6px;align-items:center;margin-bottom:8px;flex-wrap:wrap}.lbl{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-fg-subtle);font-weight:600;width:80px}@keyframes spin{to{transform:rotate(360deg)}}</style></head><body>
<div class="row"><span class="lbl">primary</span><button class="ctl ctl--primary ctl--sm">Run</button><button class="ctl ctl--primary">Run procedure</button><button class="ctl ctl--primary ctl--lg">Run</button></div>
<div class="row"><span class="lbl">secondary</span><button class="ctl ctl--sm">Edit</button><button class="ctl">Edit</button><button class="ctl ctl--lg">Edit</button></div>
<div class="row"><span class="lbl">ghost</span><button class="ctl ctl--ghost ctl--sm">Cancel</button><button class="ctl ctl--ghost">Cancel</button></div>
<div class="row"><span class="lbl">danger</span><button class="ctl ctl--danger ctl--sm">Delete</button><button class="ctl ctl--danger">Delete</button></div>
<div class="row"><span class="lbl">states</span><button class="ctl ctl--primary" disabled style="opacity:.5;cursor:not-allowed">Disabled</button><button class="ctl ctl--primary" style="position:relative;padding-left:28px"><svg style="position:absolute;left:8px;animation:spin 1s linear infinite" width="13" height="13" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-opacity=".25" stroke-width="3"/><path d="M21 12a9 9 0 0 0-9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg>Saving</button><button class="ctl" aria-label="x" style="width:32px;padding:0">⚙</button></div>
</body></html>
