<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-app);color:var(--color-fg-default);font-size:11px}.b{display:inline-flex;align-items:center;gap:4px;height:22px;padding:0 8px;font-size:11px;font-weight:500;border-radius:3px;line-height:1;margin:2px}.dot{width:6px;height:6px;border-radius:50%;display:inline-block}.row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:10px}h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-fg-subtle);margin:0 0 6px;font-weight:600}</style></head><body>
<h3>Status tones</h3>
<div class="row">
<span class="b" style="background:var(--color-success-subtle);color:var(--color-success-fg)"><span class="dot" style="background:var(--color-success-default)"></span>success</span>
<span class="b" style="background:var(--color-warning-subtle);color:var(--color-warning-fg)"><span class="dot" style="background:var(--color-warning-default)"></span>warning</span>
<span class="b" style="background:var(--color-danger-subtle);color:var(--color-danger-fg)"><span class="dot" style="background:var(--color-danger-default)"></span>danger</span>
<span class="b" style="background:var(--color-info-subtle);color:var(--color-info-fg)"><span class="dot" style="background:var(--color-info-default)"></span>info</span>
<span class="b" style="background:var(--color-neutral-subtle);color:var(--color-neutral-fg)"><span class="dot" style="background:var(--color-neutral-default)"></span>neutral</span>
<span class="b" style="background:var(--color-eeat-subtle);color:var(--color-eeat-fg)"><span class="dot" style="background:var(--color-eeat-default)"></span>eeat</span>
</div>
<h3>Status families · solids</h3>
<div class="row" style="gap:0">
<div style="flex:1;height:32px;background:var(--color-success-default)"></div>
<div style="flex:1;height:32px;background:var(--color-warning-default)"></div>
<div style="flex:1;height:32px;background:var(--color-danger-default)"></div>
<div style="flex:1;height:32px;background:var(--color-info-default)"></div>
<div style="flex:1;height:32px;background:var(--color-neutral-default)"></div>
<div style="flex:1;height:32px;background:var(--color-eeat-default)"></div>
</div>
</body></html>
