<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-surface);font-size:11px;color:var(--color-fg-default);display:grid;grid-template-columns:1fr 1fr;gap:16px}h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-fg-subtle);margin:0 0 8px;font-weight:600}.bar{display:flex;align-items:center;gap:6px;margin:4px 0;font-size:11px}.bar .lbl{font-family:var(--font-mono);color:var(--color-fg-muted);width:40px;font-size:10px}.bar .b{background:var(--color-accent-primary);height:10px}.r{display:flex;flex-wrap:wrap;gap:8px}.rb{text-align:center}.rb .sq{width:36px;height:36px;background:var(--color-bg-surface-alt);border:1px solid var(--color-border-default)}.rb p{margin:2px 0 0;font-family:var(--font-mono);font-size:9px;color:var(--color-fg-muted)}</style></head><body>
<div>
<h3>Spacing · 4px grid</h3>
<div class="bar"><span class="lbl">1 · 4</span><span class="b" style="width:4px"></span></div>
<div class="bar"><span class="lbl">2 · 8</span><span class="b" style="width:8px"></span></div>
<div class="bar"><span class="lbl">3 · 12</span><span class="b" style="width:12px"></span></div>
<div class="bar"><span class="lbl">4 · 16</span><span class="b" style="width:16px"></span></div>
<div class="bar"><span class="lbl">6 · 24</span><span class="b" style="width:24px"></span></div>
<div class="bar"><span class="lbl">8 · 32</span><span class="b" style="width:32px"></span></div>
<div class="bar"><span class="lbl">12 · 48</span><span class="b" style="width:48px"></span></div>
</div>
<div>
<h3>Radii (8px max)</h3>
<div class="r">
<div class="rb"><div class="sq" style="border-radius:2px"></div><p>xs · 2</p></div>
<div class="rb"><div class="sq" style="border-radius:4px"></div><p>sm · 4</p></div>
<div class="rb"><div class="sq" style="border-radius:6px"></div><p>md · 6</p></div>
<div class="rb"><div class="sq" style="border-radius:8px"></div><p>lg · 8</p></div>
<div class="rb"><div class="sq" style="border-radius:9999px"></div><p>full</p></div>
</div>
<h3 style="margin-top:14px">Shadows (subtle)</h3>
<div class="r">
<div class="rb"><div class="sq" style="background:var(--color-bg-surface);box-shadow:var(--shadow-xs);border:0"></div><p>xs</p></div>
<div class="rb"><div class="sq" style="background:var(--color-bg-surface);box-shadow:var(--shadow-sm);border:0"></div><p>sm</p></div>
<div class="rb"><div class="sq" style="background:var(--color-bg-surface);box-shadow:var(--shadow-md);border:0"></div><p>md</p></div>
<div class="rb"><div class="sq" style="background:var(--color-bg-surface);box-shadow:var(--shadow-lg);border:0"></div><p>lg</p></div>
<div class="rb"><div class="sq" style="background:var(--color-bg-surface);box-shadow:var(--shadow-xl);border:0"></div><p>xl</p></div>
</div>
</div>
</body></html>
