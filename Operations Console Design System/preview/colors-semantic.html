<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-app);color:var(--color-fg-default);font-size:11px}h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-fg-subtle);margin:0 0 8px;font-weight:600}.row{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-bottom:10px}.s{border:1px solid var(--color-border-subtle);border-radius:4px;overflow:hidden}.c{height:38px}.l{padding:4px 6px;background:var(--color-bg-surface);font-size:10px;line-height:1.3}.n{font-weight:600;color:var(--color-fg-default)}.v{font-family:var(--font-mono);color:var(--color-fg-muted);font-size:9px}</style></head><body>
<h3>Surface · Foreground · Border</h3>
<div class="row">
<div class="s"><div class="c" style="background:var(--color-bg-app)"></div><div class="l"><div class="n">bg.app</div><div class="v">page</div></div></div>
<div class="s"><div class="c" style="background:var(--color-bg-surface)"></div><div class="l"><div class="n">bg.surface</div><div class="v">cards</div></div></div>
<div class="s"><div class="c" style="background:var(--color-bg-surface-alt)"></div><div class="l"><div class="n">bg.surfaceAlt</div><div class="v">hover</div></div></div>
<div class="s"><div class="c" style="background:var(--color-bg-sunken)"></div><div class="l"><div class="n">bg.sunken</div><div class="v">inputs</div></div></div>
<div class="s"><div class="c" style="background:var(--color-bg-surface);color:var(--color-fg-strong);display:flex;align-items:center;justify-content:center;font-weight:600">Aa</div><div class="l"><div class="n">fg.strong</div><div class="v">titles</div></div></div>
<div class="s"><div class="c" style="background:var(--color-bg-surface);color:var(--color-fg-muted);display:flex;align-items:center;justify-content:center">Aa</div><div class="l"><div class="n">fg.muted</div><div class="v">help</div></div></div>
</div>
</body></html>
