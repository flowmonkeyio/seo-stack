<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-app);font-size:11px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}.s{border-radius:4px;overflow:hidden;border:1px solid var(--color-border-subtle)}.c{height:64px}.l{padding:6px 8px;background:var(--color-bg-surface)}.n{font-weight:600;color:var(--color-fg-default);font-size:11px}.v{font-family:var(--font-mono);color:var(--color-fg-muted);font-size:10px}h3{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-fg-subtle);margin:0 0 8px;font-weight:600}</style></head><body>
<h3>Accent · primary (blue)</h3>

</div>
</body></html>
