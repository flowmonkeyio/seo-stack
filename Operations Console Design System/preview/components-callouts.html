<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:14px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-app);font-size:12px;display:grid;grid-template-columns:1fr 1fr;gap:8px}.cal{display:flex;gap:8px;border-radius:6px;border:1px solid;padding:8px 10px}.cal p{margin:0}.cal .t{font-weight:600;line-height:1.2}.cal .d{margin-top:2px;font-size:11px;opacity:.9;line-height:1.35}.icn{flex-shrink:0;margin-top:1px;font-weight:700;font-size:13px;width:14px;text-align:center}</style></head><body>
<div class="cal" style="background:var(--color-info-subtle);border-color:var(--color-info-border);color:var(--color-info-fg)"><span class="icn">i</span><div><p class="t">GSC sync delayed</p><p class="d">Last refresh 4h ago. Numbers may lag.</p></div></div>
<div class="cal" style="background:var(--color-warning-subtle);border-color:var(--color-warning-border);color:var(--color-warning-fg)"><span class="icn">!</span><div><p class="t">Budget at 85%</p><p class="d">$425 of $500 monthly cap consumed.</p></div></div>
<div class="cal" style="background:var(--color-danger-subtle);border-color:var(--color-danger-border);color:var(--color-danger-fg)"><span class="icn">×</span><div><p class="t">3 publish failures</p><p class="d">CMS rejected articles. Open run to retry.</p></div></div>
<div class="cal" style="background:var(--color-success-subtle);border-color:var(--color-success-border);color:var(--color-success-fg)"><span class="icn">✓</span><div><p class="t">Schema valid</p><p class="d">All 24 articles passed validation.</p></div></div>
</body></html>
