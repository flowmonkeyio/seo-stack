<!DOCTYPE html><html><head><meta charset="UTF-8"><link rel="stylesheet" href="../colors_and_type.css"><style>body{margin:0;padding:16px;font-family:Inter,system-ui,sans-serif;background:var(--color-bg-surface);color:var(--color-fg-default);font-size:13px;display:grid;grid-template-columns:1fr 1fr;gap:16px}.f{display:flex;flex-direction:column;gap:6px}label{font-size:11px;font-weight:500;color:var(--color-fg-default)}.req{color:var(--color-danger-default)}.input{height:32px;padding:0 10px;border:1px solid var(--color-border-default);border-radius:4px;font-size:13px;background:var(--color-bg-surface);color:var(--color-fg-default);width:100%;box-sizing:border-box}.input:focus{outline:2px solid var(--color-border-focus);outline-offset:2px;border-color:var(--color-border-focus)}.bad{border-color:var(--color-danger-default)}.help{font-size:11px;color:var(--color-fg-muted)}.err{font-size:11px;color:var(--color-danger-fg);display:flex;align-items:center;gap:4px}.sw{display:inline-flex;align-items:center;width:34px;height:18px;border-radius:9999px;background:var(--color-accent-primary);padding:2px;cursor:pointer}.sw .k{width:14px;height:14px;border-radius:50%;background:var(--color-bg-surface);margin-left:auto}</style></head><body>
<div class="f"><label>Project name <span class="req">*</span></label><input class="input" value="acme-content"/><p class="help">Use kebab-case. Cannot change later.</p></div>
<div class="f"><label>Slug</label><input class="input bad" value="bad slug!"/><p class="err">⚠ Only a-z, 0-9, dashes.</p></div>
<div class="f"><label>Default locale</label><select class="input"><option>en-US</option><option>en-GB</option></select></div>
<div class="f"><label>Drift monitoring</label><div style="display:flex;align-items:center;gap:8px"><span class="sw"><span class="k"></span></span><span style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--color-success-fg);font-weight:600">on</span></div></div>
</body></html>
