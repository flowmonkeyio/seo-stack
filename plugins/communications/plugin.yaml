      - slack-bot.reaction.add
      - slack-bot.message.delete
      - slack-bot.conversation.open
      - slack-bot.conversation.info
      - slack-bot.conversation.list
      - slack-bot.conversation.members
      - smtp.email.send
      - imap.mailbox.list
      - imap.messages.search
