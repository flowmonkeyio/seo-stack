slug: communications
name: Communications
version: 0.1.0
description: First-party StackOS package for messaging, email send, mailbox/message lifecycle, and agent-trigger resources.
source: builtin
capabilities:
  - key: messaging
    name: Messaging
    description: Send and receive chat-style messages from explicit agent inputs.
    kind: utility
  - key: email-send
    name: Email Send
    description: Send email through configured providers from explicit agent payloads.
    kind: utility
  - key: email-inbox
    name: Email Inbox
    description: Inspect mailbox messages and flags with bounded queries.
    kind: utility
  - key: agent-triggering
    name: Agent Triggering
    description: Store inbound provider events as generic claimable agent requests.
    kind: utility
providers:
  - key: local-agent-chat
    name: Local Agent Chat
    description: StackOS local conversation surface for direct human-to-agent messages, rich response blocks, and interaction events.
    auth_type: none
    config:
      setup_note: Local agent chat stores messages and interactions in StackOS resources; the agent runner owns model invocation and decisions.
      docs:
        - docs/integration-contracts/communications.md
  - key: telegram-bot
    name: Telegram Bot
    description: Telegram Bot API provider for bot identity, project-scoped communication profile messaging, webhook ingress, and diagnostics.
    auth_type: bot-token
    auth_methods:
      - key: bot-token
        label: Bot token
        auth_type: bot-token
        payload_format: json
        fields:
          - key: bot_token
            label: Bot Token
            type: secret
            secret: true
            required: true
            placeholder: "123456:ABC..."
          - key: webhook_secret_token
            label: Webhook Secret Token
            type: secret
            secret: true
            required: false
            description: Generated automatically if left blank. Override only when rotating webhook validation manually.
          - key: api_base_url
            label: Local Bot API URL
            type: text
            secret: false
            required: false
            placeholder: http://127.0.0.1:8081
            description: Leave blank for Telegram's hosted Bot API. Use only with the official self-hosted Telegram Bot API server.
    config:
      setup_note: Store only Telegram token material and transport endpoints here. Bot identity, agent guidance, command intent guidance, access, trigger, context, and response policy belong on project-scoped communication-profile records. The provider_facets.telegram-bot object stores only safe Telegram-specific refs/settings such as auth_profile_key, bot username, webhook settings, allowed updates, and provider id maps.
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api
  - key: slack-bot
    name: Slack Bot
    description: Slack Web API provider for bot identity, message sends, conversation discovery, membership sync, and signed HTTP ingress.
    auth_type: bot-token
    auth_methods:
      - key: bot-token
        label: Bot token and signing secret
        auth_type: bot-token
        payload_format: json
        fields:
          - key: bot_token
            label: Bot Token
            type: secret
            secret: true
            required: true
            placeholder: xoxb-...
          - key: signing_secret
            label: Signing Secret
            type: secret
            secret: true
            required: true
            description: Used by daemon-side Slack Events API and interaction signature verification.
    config:
      setup_note: Store only the Slack bot token and signing secret here. StackOS discovers safe workspace and bot identity metadata during credential testing. Agent identity, access, trigger, context, response, send, and handoff policy belong to project-scoped communication-profile records with slack-bot provider facets.
      scopes:
        - chat:write
        - app_mentions:read
        - channels:history
        - groups:history
        - im:history
        - mpim:history
        - channels:read
        - groups:read
        - im:read
        - mpim:read
        - im:write
        - mpim:write
        - reactions:write
      deferred_auth_methods:
        - oauth2-install
      deferred_runtime:
        - socket-mode-listener
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/chat.postMessage/
        - https://docs.slack.dev/authentication/verifying-requests-from-slack/
        - https://docs.slack.dev/apis/events-api/
  - key: smtp
    name: SMTP
    description: SMTP provider for send-only email. Acceptance by the SMTP server is not delivery or read confirmation.
    auth_type: smtp-password
    auth_methods:
      - key: smtp-password
        label: SMTP password
        auth_type: smtp-password
        payload_format: json
        fields:
          - key: password
            label: Password
            type: secret
            secret: true
            required: true
          - key: host
            label: Host
            type: text
            secret: false
            required: true
            placeholder: smtp.example.com
          - key: port
            label: Port
            type: number
            secret: false
            required: true
            placeholder: "587"
          - key: tls_mode
            label: TLS Mode
            type: select
            secret: false
            required: true
            options:
              - label: STARTTLS
                value: starttls
              - label: SSL
                value: ssl
              - label: None
                value: none
          - key: username
            label: Username
            type: text
            secret: false
            required: true
          - key: from_email
            label: From Email
            type: text
            secret: false
            required: true
          - key: from_name
            label: From Name
            type: text
            secret: false
            required: false
          - key: reply_to
            label: Reply To
            type: text
            secret: false
            required: false
          - key: timeout_s
            label: Timeout Seconds
            type: number
            secret: false
            required: false
    config:
      setup_note: SMTP is send-only. Use IMAP or provider webhooks for mailbox read/unread, replies, bounces, or delivery events.
      deferred_auth_methods:
        - oauth-xoauth2
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc5321.html
        - https://www.rfc-editor.org/rfc/rfc4954
  - key: imap
    name: IMAP
    description: IMAP provider for mailbox listing, search, fetch, and message flag lifecycle.
    auth_type: imap-password
    auth_methods:
      - key: imap-password
        label: IMAP password
        auth_type: imap-password
        payload_format: json
        fields:
          - key: password
            label: Password
            type: secret
            secret: true
            required: true
          - key: host
            label: Host
            type: text
            secret: false
            required: true
            placeholder: imap.example.com
          - key: port
            label: Port
            type: number
            secret: false
            required: true
            placeholder: "993"
          - key: tls_mode
            label: TLS Mode
            type: select
            secret: false
            required: true
            options:
              - label: SSL
                value: ssl
              - label: STARTTLS
                value: starttls
              - label: None
                value: none
          - key: username
            label: Username
            type: text
            secret: false
            required: true
          - key: default_mailbox
            label: Default Mailbox
            type: text
            secret: false
            required: false
            placeholder: INBOX
          - key: mailbox_refs
            label: Mailbox Refs
            type: text
            secret: false
            required: false
            placeholder: safe mailbox refs, comma separated
          - key: search_limit
            label: Search Limit
            type: number
            secret: false
            required: false
    config:
      setup_note: IMAP operations must use UIDs and UIDVALIDITY, not sequence-number-only references.
      deferred_auth_methods:
        - oauth-xoauth2
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc9051.html
actions:
  - key: telegram-bot.identity.get
    name: Get Telegram Bot Identity
    description: Verify a Telegram bot token and return safe bot identity metadata.
    provider: telegram-bot
    capability: messaging
    risk_level: read
    input_schema: &empty_input
      type: object
      additionalProperties: false
      properties: {}
    output_schema: &object_schema
      type: object
      additionalProperties: true
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: identity.get
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api
  - key: telegram-bot.message.send
    name: Send Telegram Message
    description: Send a Telegram bot text message to an explicit allowed chat reference, with optional reply markup.
    provider: telegram-bot
    capability: messaging
    risk_level: write
    input_schema: &telegram_message_input
      type: object
      additionalProperties: false
      required:
        - chat_ref
        - profile_key
        - text
      properties:
        profile_key:
          type: string
        chat_ref:
          type: string
        text:
          type: string
        parse_mode:
          type: string
        disable_notification:
          type: boolean
        source_agent_request_id:
          type: integer
        reply_to_message_ref:
          type: string
        thread_ref:
          type: string
        direct_messages_topic_ref:
          type: string
        control_metadata:
          type: object
          additionalProperties: true
        reply_markup:
          type: object
          additionalProperties: false
          properties:
            inline_keyboard:
              type: array
              maxItems: 20
              items:
                type: array
                maxItems: 8
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - text
                  properties:
                    text:
                      type: string
                    url:
                      type: string
                    callback_data:
                      type: string
                      minLength: 1
                      maxLength: 64
                    allowed_user_refs:
                      type: array
                      items:
                        type: string
                    allowed_chat_refs:
                      type: array
                      items:
                        type: string
                  oneOf:
                    - required:
                        - url
                    - required:
                        - callback_data
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: message.send
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#sendmessage
  - key: telegram-bot.photo.send
    name: Send Telegram Photo
    description: Send a Telegram bot photo/image message from a file id, public URL, or StackOS artifact ref.
    provider: telegram-bot
    capability: messaging
    risk_level: write
    input_schema: &telegram_photo_input
      type: object
      additionalProperties: false
      required:
        - chat_ref
        - profile_key
        - photo
      properties:
        profile_key:
          type: string
        chat_ref:
          type: string
        photo:
          type: object
          additionalProperties: false
          oneOf:
            - required:
                - file_id
            - required:
                - url
            - required:
                - artifact_ref
          properties:
            file_id:
              type: string
            url:
              type: string
              pattern: '^https://'
            artifact_ref:
              type: string
        caption:
          type: string
        parse_mode:
          type: string
        disable_notification:
          type: boolean
        source_agent_request_id:
          type: integer
        reply_to_message_ref:
          type: string
        thread_ref:
          type: string
        direct_messages_topic_ref:
          type: string
        control_metadata:
          type: object
          additionalProperties: true
        reply_markup:
          type: object
          additionalProperties: false
          properties:
            inline_keyboard:
              type: array
              maxItems: 20
              items:
                type: array
                maxItems: 8
                items:
                  type: object
                  additionalProperties: false
                  required:
                    - text
                  properties:
                    text:
                      type: string
                    url:
                      type: string
                    callback_data:
                      type: string
                      minLength: 1
                      maxLength: 64
                    allowed_user_refs:
                      type: array
                      items:
                        type: string
                    allowed_chat_refs:
                      type: array
                      items:
                        type: string
                  oneOf:
                    - required:
                        - url
                    - required:
                        - callback_data
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: photo.send
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#sendphoto
  - key: telegram-bot.callback.answer
    name: Answer Telegram Callback
    description: Acknowledge a Telegram inline button callback query with optional notification text.
    provider: telegram-bot
    capability: agent-triggering
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      required:
        - profile_key
        - callback_query_id
      properties:
        profile_key:
          type: string
        callback_query_id:
          type: string
        text:
          type: string
        show_alert:
          type: boolean
        url:
          type: string
        cache_time:
          type: integer
          minimum: 0
          maximum: 3600
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: callback.answer
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#answercallbackquery
  - key: telegram-bot.message.reaction.set
    name: Set Telegram Message Reaction
    description: Set a native Telegram emoji reaction on an explicit Telegram message reference.
    provider: telegram-bot
    capability: messaging
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      required:
        - profile_key
        - message_ref
        - emoji
      properties:
        profile_key:
          type: string
        message_ref:
          type: string
        emoji:
          type: string
          minLength: 1
          maxLength: 64
        is_big:
          type: boolean
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: message.reaction.set
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#setmessagereaction
  - key: telegram-bot.message.delete
    name: Delete Telegram Message
    description: Delete an explicit Telegram message reference when Telegram permits the bot to delete it.
    provider: telegram-bot
    capability: messaging
    risk_level: destructive
    input_schema:
      type: object
      additionalProperties: false
      required:
        - profile_key
        - message_ref
      properties:
        profile_key:
          type: string
        message_ref:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: message.delete
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#deletemessage
  - key: telegram-bot.updates.poll
    name: Inspect Telegram Updates
    description: Bounded diagnostic getUpdates call for setup/debugging only; it does not normalize updates, store resources, or create agent requests.
    provider: telegram-bot
    capability: agent-triggering
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      required:
        - profile_key
        - limit
        - timeout_s
        - allowed_updates
      properties:
        profile_key:
          type: string
        cursor_ref:
          type: string
        offset:
          type: integer
        limit:
          type: integer
          minimum: 1
          maximum: 100
        timeout_s:
          type: integer
          minimum: 0
          maximum: 60
        allowed_updates:
          type: array
          items:
            type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: updates.poll
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#getupdates
  - key: telegram-bot.webhook.set
    name: Set Telegram Webhook
    description: Set the Telegram webhook URL for a communication profile after deployment and secret-token verification are configured.
    provider: telegram-bot
    capability: agent-triggering
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      required:
        - profile_key
        - webhook_url
      properties:
        profile_key:
          type: string
        webhook_url:
          type: string
        allowed_updates:
          type: array
          items:
            type: string
        drop_pending_updates:
          type: boolean
        max_connections:
          type: integer
          minimum: 1
          maximum: 100
        ip_address:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: webhook.set
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#setwebhook
  - key: telegram-bot.webhook.delete
    name: Delete Telegram Webhook
    description: Remove a Telegram webhook for a project-scoped communication profile.
    provider: telegram-bot
    capability: agent-triggering
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      required:
        - profile_key
      properties:
        profile_key:
          type: string
        drop_pending_updates:
          type: boolean
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: webhook.delete
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#deletewebhook
  - key: telegram-bot.webhook.info
    name: Get Telegram Webhook Info
    description: Read safe Telegram webhook status for a communication profile.
    provider: telegram-bot
    capability: agent-triggering
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      required:
        - profile_key
      properties:
        profile_key:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: telegram-bot
      operation: webhook.info
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://core.telegram.org/bots/api#getwebhookinfo
  - key: slack-bot.identity.get
    name: Get Slack Bot Identity
    description: Verify a Slack bot token and return safe workspace/bot identity metadata.
    provider: slack-bot
    capability: messaging
    risk_level: read
    input_schema: *empty_input
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: identity.get
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/auth.test/
  - key: slack-bot.message.send
    name: Send Slack Message
    description: Send a Slack bot message to an explicit channel/DM surface, with optional Block Kit buttons and thread reply.
    provider: slack-bot
    capability: messaging
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      anyOf:
        - required:
            - channel_ref
        - required:
            - surface_ref
      oneOf:
        - required:
            - text
        - required:
            - blocks
      properties:
        profile_ref:
          type: string
          description: Optional communication-profile key/ref that owns outbound interaction state. Defaults to the credential profile key when omitted.
        channel_ref:
          type: string
        surface_ref:
          type: string
        text:
          type: string
        blocks:
          type: array
          maxItems: 50
          items:
            type: object
            additionalProperties: true
        thread_ref:
          type: string
        reply_broadcast:
          type: boolean
        unfurl_links:
          type: boolean
        unfurl_media:
          type: boolean
        source_agent_request_id:
          type: integer
          minimum: 1
        control_metadata:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: message.send
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/chat.postMessage/
        - https://docs.slack.dev/reference/block-kit/block-elements/button-element/
  - key: slack-bot.reaction.add
    name: Add Slack Message Reaction
    description: Add a native Slack emoji reaction to an explicit Slack message reference.
    provider: slack-bot
    capability: messaging
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      required:
        - message_ref
        - name
      properties:
        profile_ref:
          type: string
          description: Optional communication-profile key/ref that owns reaction state. Defaults to the credential profile key when omitted.
        message_ref:
          type: string
        channel_ref:
          type: string
        surface_ref:
          type: string
        name:
          type: string
          minLength: 1
          maxLength: 128
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: reaction.add
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/reactions.add/
  - key: slack-bot.message.delete
    name: Delete Slack Message
    description: Delete an explicit Slack message reference when Slack permits the bot to delete it.
    provider: slack-bot
    capability: messaging
    risk_level: destructive
    input_schema:
      type: object
      additionalProperties: false
      required:
        - message_ref
      properties:
        profile_ref:
          type: string
          description: Optional communication-profile key/ref that owns message state. Defaults to the credential profile key when omitted.
        message_ref:
          type: string
        channel_ref:
          type: string
        surface_ref:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: message.delete
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/chat.delete/
  - key: slack-bot.conversation.open
    name: Open Slack Conversation
    description: Open or resume a Slack DM or MPIM using explicit Slack user refs, or resume an existing IM/MPIM channel.
    provider: slack-bot
    capability: messaging
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      anyOf:
        - required:
            - users
        - required:
            - channel_ref
      properties:
        profile_ref:
          type: string
          description: Optional communication-profile key/ref that owns discovered conversation state. Defaults to the credential profile key when omitted.
        users:
          type: array
          minItems: 1
          maxItems: 8
          items:
            type: string
        channel_ref:
          type: string
        return_im:
          type: boolean
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: conversation.open
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/conversations.open/
  - key: slack-bot.conversation.info
    name: Get Slack Conversation Info
    description: Fetch safe metadata for one Slack conversation by channel/surface ref.
    provider: slack-bot
    capability: messaging
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      anyOf:
        - required:
            - channel_ref
        - required:
            - surface_ref
      properties:
        profile_ref:
          type: string
          description: Optional communication-profile key/ref that owns discovered conversation state. Defaults to the credential profile key when omitted.
        channel_ref:
          type: string
        surface_ref:
          type: string
        include_num_members:
          type: boolean
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: conversation.info
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/conversations.info/
  - key: slack-bot.conversation.list
    name: List Slack Conversations
    description: List Slack conversations with explicit type filters and cursor pagination.
    provider: slack-bot
    capability: messaging
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      properties:
        profile_ref:
          type: string
          description: Optional communication-profile key/ref that owns discovered conversation state. Defaults to the credential profile key when omitted.
        types:
          type: array
          items:
            type: string
            enum:
              - public_channel
              - private_channel
              - mpim
              - im
        cursor:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 1000
        exclude_archived:
          type: boolean
        team_id:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: conversation.list
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/conversations.list/
  - key: slack-bot.conversation.members
    name: List Slack Conversation Members
    description: List member refs for one Slack conversation with cursor pagination.
    provider: slack-bot
    capability: messaging
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      anyOf:
        - required:
            - channel_ref
        - required:
            - surface_ref
      properties:
        profile_ref:
          type: string
          description: Optional communication-profile key/ref that owns discovered conversation state. Defaults to the credential profile key when omitted.
        channel_ref:
          type: string
        surface_ref:
          type: string
        cursor:
          type: string
        limit:
          type: integer
          minimum: 1
          maximum: 1000
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: slack-bot
      operation: conversation.members
      requires_credential: true
      enforce_budget: false
      docs:
        - docs/integration-contracts/communications.md
        - https://docs.slack.dev/reference/methods/conversations.members/
  - key: smtp.email.send
    name: Send SMTP Email
    description: Send email through SMTP from an explicit agent-supplied message payload.
    provider: smtp
    capability: email-send
    risk_level: write
    input_schema:
      type: object
      additionalProperties: false
      required:
        - recipients
        - subject
      anyOf:
        - required:
            - text
        - required:
            - html
      properties:
        recipients:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: string
            minLength: 1
        cc:
          type: array
          maxItems: 100
          items:
            type: string
            minLength: 1
        bcc:
          type: array
          maxItems: 100
          items:
            type: string
            minLength: 1
        subject:
          type: string
          minLength: 1
          maxLength: 998
        text:
          type: string
        html:
          type: string
        from_ref:
          type: string
        reply_to:
          type: string
        source_agent_request_id:
          type: integer
          minimum: 1
        headers:
          type: object
          maxProperties: 50
          additionalProperties:
            type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: smtp
      operation: email.send
      requires_credential: true
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc5321.html
        - https://www.rfc-editor.org/rfc/rfc4954
  - key: imap.mailbox.list
    name: List IMAP Mailboxes
    description: List safe mailbox metadata available to a configured IMAP credential.
    provider: imap
    capability: email-inbox
    risk_level: read
    input_schema: *empty_input
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: imap
      operation: mailbox.list
      requires_credential: true
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc9051.html
  - key: imap.messages.search
    name: Search IMAP Messages
    description: Search a bounded IMAP mailbox by safe mailbox reference and provider-valid criteria.
    provider: imap
    capability: email-inbox
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      required:
        - mailbox_ref
        - limit
      properties:
        mailbox_ref:
          type: string
        cursor_ref:
          type: string
        criteria:
          type: object
          additionalProperties: false
          properties:
            unseen:
              type: boolean
            seen:
              type: boolean
            from:
              type: string
            to:
              type: string
            subject:
              type: string
            text:
              type: string
            since:
              type: string
              pattern: '^\d{1,2}-[A-Za-z]{3}-\d{4}$'
            before:
              type: string
              pattern: '^\d{1,2}-[A-Za-z]{3}-\d{4}$'
            uid_from:
              type: integer
              minimum: 1
            uid_to:
              oneOf:
                - type: integer
                  minimum: 1
                - type: string
                  enum:
                    - "*"
        limit:
          type: integer
          minimum: 1
          maximum: 500
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: imap
      operation: messages.search
      requires_credential: true
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc9051.html
  - key: imap.message.fetch
    name: Fetch IMAP Message
    description: Fetch selected fields for one IMAP message by UID and mailbox reference.
    provider: imap
    capability: email-inbox
    risk_level: read
    input_schema:
      type: object
      additionalProperties: false
      required:
        - mailbox_ref
        - uid
      properties:
        mailbox_ref:
          type: string
        uid:
          type: integer
        fields:
          type: array
          items:
            type: string
            enum:
              - subject
              - from
              - to
              - cc
              - date
              - message_id
              - text_preview
              - html_preview
              - body_text
              - body_html
              - flags
              - headers
        max_body_bytes:
          type: integer
          minimum: 0
          maximum: 1048576
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: imap
      operation: message.fetch
      requires_credential: true
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc9051.html
  - key: imap.message.mark_seen
    name: Mark IMAP Message Seen
    description: Add the IMAP Seen flag to one message by UID after explicit grant.
    provider: imap
    capability: email-inbox
    risk_level: write
    input_schema: &imap_mark_input
      type: object
      additionalProperties: false
      required:
        - mailbox_ref
        - uid
      properties:
        mailbox_ref:
          type: string
        uid:
          type: integer
          minimum: 1
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: imap
      operation: message.mark_seen
      requires_credential: true
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc9051.html
  - key: imap.message.mark_unseen
    name: Mark IMAP Message Unseen
    description: Remove the IMAP Seen flag from one message by UID after explicit grant.
    provider: imap
    capability: email-inbox
    risk_level: write
    input_schema: *imap_mark_input
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: imap
      operation: message.mark_unseen
      requires_credential: true
      docs:
        - docs/integration-contracts/communications.md
        - https://www.rfc-editor.org/rfc/rfc9051.html
resources:
  - key: ingress-endpoint
    name: Ingress Endpoint
    description: Project-level public ingress base URL and route map for provider webhooks such as Slack Events API and Telegram setWebhook.
    schema: *object_schema
  - key: communication-profile
    name: Communication Profile
    description: Provider-neutral agent communication identity, guidance, policy, and provider facets for chat, email, and future transports.
    schema: *object_schema
  - key: communication-contact
    name: Communication Contact
    description: Safe project-local person, bot, customer, or organization identity linked to provider-specific user/email refs.
    schema: *object_schema
  - key: communication-target
    name: Communication Target
    description: Named, policy-checked destination alias that resolves to an explicit provider surface/thread/action target.
    schema: *object_schema
  - key: communication-route
    name: Communication Route
    description: Static cross-surface routing policy such as Telegram customer issue to internal Slack channel.
    schema: *object_schema
  - key: communication-membership
    name: Communication Membership
    description: Provider-neutral membership, permission, role, and availability state for profiles or contacts inside a communication surface.
    schema: *object_schema
  - key: communication-channel
    name: Communication Channel
    description: Safe communication surface metadata for a Telegram chat/channel, Slack conversation, SMTP identity, IMAP mailbox, local chat, or future transport.
    schema: *object_schema
  - key: communication-thread
    name: Communication Thread
    description: Conversation grouping such as a Telegram chat/topic or email thread.
    schema: *object_schema
  - key: communication-message
    name: Communication Message
    description: Normalized inbound or outbound message with local processing and attention state.
    schema: *object_schema
  - key: communication-interaction
    name: Communication Interaction
    description: Provider interaction state for buttons, callbacks, reply controls, and future rich-message controls.
    schema: *object_schema
  - key: communication-event
    name: Communication Event
    description: Provider event such as a Telegram edit, IMAP flag change, SMTP rejection, or future delivery webhook.
    schema: *object_schema
  - key: communication-cursor
    name: Communication Cursor
    description: Provider sync state such as Telegram update offset or IMAP UID/UIDVALIDITY cursor.
    schema: *object_schema
  - key: agent-request-source
    name: Agent Request Source
    description: Static allowlist and source metadata for creating generic agent requests from communication events.
    schema: *object_schema
ui:
  nav:
    section: Communications
    items:
      - key: communications.resources
        label: Communications Resources
        to: resources?plugin_slug=communications
        matchPrefix: true
      - key: communications.templates
        label: Communications Templates
        to: workflow-templates?plugin_slug=communications
