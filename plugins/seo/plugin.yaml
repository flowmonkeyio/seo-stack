slug: seo
name: SEO
version: 0.1.0
description: First-party StackOS domain package for SEO resource schemas, provider contracts, and reusable templates.
source: builtin
capabilities:
  - key: seo-research
    name: SEO Research
    description: Keyword, SERP, competitor, and source research contracts.
    kind: domain
  - key: seo-content
    name: SEO Content
    description: Content opportunity, brief, content piece, refresh, and link-opportunity records.
    kind: domain
  - key: seo-measurement
    name: SEO Measurement
    description: Search performance snapshots, observations, and experiment inputs.
    kind: domain
providers:
  - key: dataforseo
    name: DataForSEO
    description: SERP, keyword volume, and competitor research provider.
    auth_type: api-key
    auth_methods:
      - key: basic
        label: Login and password
        auth_type: basic
        payload_format: raw
        payload_field: password
        fields:
        - key: login
          label: API Login
          type: text
          secret: false
          required: true
          placeholder: login@example.com
        - key: password
          label: API Password
          type: secret
          secret: true
          required: true
  - key: ahrefs
    name: Ahrefs
    description: Organic keyword and backlink research provider; requires eligible API access and API units.
    auth_type: api-key
    auth_methods:
      - key: api_key
        label: API key
        auth_type: api-key
        payload_format: raw
        payload_field: api_key
        fields:
        - key: api_key
          label: API Key
          type: secret
          secret: true
          required: true
    config:
      setup_note: Ahrefs API v3 usage consumes API units; confirm the plan, key limits, and remaining units before high-volume runs.
actions:
  - key: keyword.research
    name: Research Keywords
    description: Collect keyword ideas, volume, and CPC evidence from DataForSEO Google Ads Live search volume; max 1000 keywords per request.
    provider: dataforseo
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - keywords
      properties:
        keywords:
          type: array
          maxItems: 1000
          items:
            type: string
        location:
          type: string
        language:
          type: string
    output_schema: &object_schema
      type: object
      additionalProperties: true
    config:
      schema_version: stackos.action.v1
      connector: dataforseo
      operation: keyword.research
      requires_credential: true
      budget_kind: dataforseo
      enforce_budget: true
  - key: serp.analyze
    name: Analyze SERP
    description: Fetch live SERP result evidence for an agent-selected query through DataForSEO; depth is capped at the documented top 100 results.
    provider: dataforseo
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - keyword
      properties:
        keyword:
          type: string
        location:
          type: string
        language:
          type: string
        depth:
          type: integer
          minimum: 1
          maximum: 100
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: dataforseo
      operation: serp.analyze
      requires_credential: true
      budget_kind: dataforseo
      enforce_budget: true
  - key: paa.extract
    name: Extract People Also Ask
    description: Fetch People Also Ask evidence for an agent-selected query through DataForSEO.
    provider: dataforseo
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - keyword
      properties:
        keyword:
          type: string
        location:
          type: string
        language:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: dataforseo
      operation: paa
      requires_credential: true
      budget_kind: dataforseo
      enforce_budget: true
  - key: competitor.keywords
    name: Competitor Keywords
    description: Pull competitor organic keyword evidence for agent analysis; Ahrefs API-unit budget reconciliation is provider-side until unit headers are captured.
    provider: ahrefs
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - target
      properties:
        target:
          type: string
        country:
          type: string
        limit:
          type: integer
        date:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: ahrefs
      operation: competitor.keywords
      requires_credential: true
      budget_kind: ahrefs
      enforce_budget: false
  - key: backlink.research
    name: Backlink Research
    description: Pull backlink evidence for an agent-defined SEO investigation; Ahrefs API-unit budget reconciliation is provider-side until unit headers are captured.
    provider: ahrefs
    capability: seo-research
    risk_level: cost
    input_schema:
      type: object
      additionalProperties: false
      required:
        - target
      properties:
        target:
          type: string
        mode:
          type: string
        limit:
          type: integer
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: ahrefs
      operation: backlink.research
      requires_credential: true
      budget_kind: ahrefs
      enforce_budget: false
resources:
  - key: keyword-opportunity
    name: Keyword Opportunity
    description: Agent-curated keyword or query opportunity with evidence and priority metadata.
    schema: *object_schema
  - key: serp-snapshot
    name: SERP Snapshot
    description: Normalized SERP evidence captured for later comparison or brief creation.
    schema: *object_schema
  - key: content-brief
    name: Content Brief
    description: Reusable content brief contract created by an agent.
    schema: *object_schema
  - key: content-piece
    name: Content Piece
    description: SEO content work item, draft pointer, ownership metadata, or refresh state.
    schema: *object_schema
  - key: content-refresh
    name: Content Refresh
    description: Refresh opportunity, diagnosis, action taken, and observed result.
    schema: *object_schema
  - key: link-opportunity
    name: Link Opportunity
    description: Internal or external link opportunity with rationale and status.
    schema: *object_schema
  - key: search-performance-snapshot
    name: Search Performance Snapshot
    description: Imported or summarized search-performance metrics for agent analysis.
    schema: *object_schema
ui:
  nav:
    section: SEO
    items:
      - key: seo.resources
        label: SEO Resources
        to: resources?plugin_slug=seo
        matchPrefix: true
      - key: seo.templates
        label: SEO Templates
        to: workflow-templates?plugin_slug=seo
config:
  schema_version: stackos.plugin.v1
