slug: media-buying
name: Media Buying
version: 0.1.0
description: First-party StackOS domain package for paid media provider contracts, resource schemas, and reusable workflow templates.
source: builtin
capabilities:
  - key: campaign-management
    name: Campaign Management
    description: Create, update, pause, resume, and inspect paid media campaign structures from explicit agent inputs.
    kind: domain
  - key: creative-operations
    name: Creative Operations
    description: Store, assemble, upload, and relate creative assets and candidate variant sets.
    kind: domain
  - key: media-measurement
    name: Media Measurement
    description: Import or summarize campaign performance snapshots for agent analysis.
    kind: domain
  - key: audience-management
    name: Audience Management
    description: Describe audience records, targeting notes, and sync contracts.
    kind: domain
  - key: media-experimentation
    name: Media Experimentation
    description: Plan and record paid media experiments without hard-coding outcomes.
    kind: domain
providers:
  - key: meta-ads
    name: Meta Ads
    description: Meta Marketing API provider contract for ad accounts, campaigns, ad sets, ads, creatives, and insights.
    auth_type: oauth
    auth_methods:
      - key: oauth2_token
        label: OAuth2 access token
        auth_type: oauth
        payload_format: json
        fields:
        - key: access_token
          label: Access Token
          type: secret
          secret: true
          required: true
        - key: business_ref
          label: Business Ref
          type: text
          secret: false
          required: false
          placeholder: business or portfolio reference
        - key: api_version
          label: API Version
          type: text
          secret: false
          required: false
          placeholder: v25.0
  - key: google-ads
    name: Google Ads
    description: Google Ads API provider contract for customers, budgets, campaigns, ad groups, assets, ads, reporting, and conversions.
    auth_type: oauth
    auth_methods:
      - key: oauth2_refresh_token
        label: OAuth2 refresh token
        auth_type: oauth
        payload_format: json
        fields:
        - key: developer_token
          label: Developer Token
          type: secret
          secret: true
          required: true
        - key: client_id
          label: Client ID
          type: secret
          secret: true
          required: true
        - key: client_secret
          label: Client Secret
          type: secret
          secret: true
          required: true
        - key: refresh_token
          label: Refresh Token
          type: secret
          secret: true
          required: true
        - key: manager_account_ref
          label: Manager Account Ref
          type: text
          secret: false
          required: false
          placeholder: safe manager account reference
        - key: customer_ref
          label: Customer Ref
          type: text
          secret: false
          required: false
          placeholder: safe customer account reference
  - key: outbrain
    name: Outbrain
    description: Outbrain Amplify provider contract. OB-TOKEN-V1 generation, storage, expiry checks, and rotation stay daemon-side.
    auth_type: api-key
    auth_methods:
      - key: ob_token_v1
        label: OB-TOKEN-V1
        auth_type: api-key
        payload_format: raw
        payload_field: token
        fields:
        - key: token
          label: OB-TOKEN-V1
          type: secret
          secret: true
          required: true
        - key: account_ref
          label: Account Ref
          type: text
          secret: false
          required: false
          placeholder: safe account reference
        - key: marketer_ref
          label: Marketer Ref
          type: text
          secret: false
          required: false
          placeholder: safe marketer reference
    config:
      token_lifecycle:
        model: daemon-managed-ob-token-v1
        max_age_days: 30
        stores_secrets_in_manifest: false
  - key: taboola
    name: Taboola
    description: Taboola Backstage API provider contract for account-scoped campaigns, items, reports, and conversion rules.
    auth_type: oauth
    auth_methods:
      - key: client_credentials
        label: Client credentials
        auth_type: oauth-client-credentials
        payload_format: json
        fields:
        - key: client_id
          label: Client ID
          type: secret
          secret: true
          required: true
        - key: client_secret
          label: Client Secret
          type: secret
          secret: true
          required: true
        - key: account_ref
          label: Account Ref
          type: text
          secret: false
          required: false
          placeholder: safe account reference
  - key: media-buying-webhook
    name: Media Buying Webhook
    description: User-owned campaign tooling exposed through project-local static HTTP actions.
    auth_type: api-key
    auth_methods:
      - key: api_key
        label: API key
        auth_type: api-key
        payload_format: raw
        payload_field: api_key
        fields:
        - key: api_key
          label: API Key
          type: secret
          secret: true
          required: true
        - key: tool_owner
          label: Tool Owner
          type: text
          secret: false
          required: false
          placeholder: team or system name
actions:
  - key: meta.account.list
    name: List Meta Ad Accounts
    description: Read Meta ad account metadata available to the configured credential.
    provider: meta-ads
    capability: campaign-management
    risk_level: read
    input_schema: &account_list_input
      type: object
      additionalProperties: false
      properties:
        filters:
          type: object
          additionalProperties: true
        fields:
          type: array
          items:
            type: string
        limit:
          type: integer
        after:
          type: string
    output_schema: &object_schema
      type: object
      additionalProperties: true
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: account.list
      requires_credential: true
  - key: meta.campaign.create
    name: Create Meta Campaign
    description: Create a Meta campaign from an explicit agent-supplied campaign object.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &campaign_create_input
      type: object
      additionalProperties: false
      required:
        - account_ref
        - campaign
      properties:
        account_ref:
          type: string
        campaign:
          type: object
          additionalProperties: true
          required:
            - name
            - objective
            - special_ad_categories
          properties:
            name:
              type: string
            objective:
              type: string
            status:
              type: string
            special_ad_categories:
              type: array
              items:
                type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: campaign.create
      requires_credential: true
  - key: meta.campaign.update
    name: Update Meta Campaign
    description: Update a Meta campaign from an explicit change object.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &campaign_update_input
      type: object
      additionalProperties: false
      required:
        - campaign_ref
        - changes
      properties:
        account_ref:
          type: string
        campaign_ref:
          type: string
        changes:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: campaign.update
      requires_credential: true
  - key: meta.campaign.pause
    name: Pause Meta Campaign
    description: Pause a Meta campaign by safe campaign reference.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &campaign_ref_input
      type: object
      additionalProperties: false
      required:
        - campaign_ref
      properties:
        campaign_ref:
          type: string
        reason:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: campaign.pause
      requires_credential: true
  - key: meta.campaign.resume
    name: Resume Meta Campaign
    description: Resume a Meta campaign by safe campaign reference.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: *campaign_ref_input
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: campaign.resume
      requires_credential: true
  - key: meta.ad_set.create
    name: Create Meta Ad Set
    description: Create a Meta ad set from explicit targeting, placement, budget, and schedule input.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &ad_set_input
      type: object
      additionalProperties: false
      required:
        - account_ref
        - campaign_ref
        - ad_set
      properties:
        account_ref:
          type: string
        campaign_ref:
          type: string
        ad_set:
          type: object
          additionalProperties: true
          required:
            - name
          properties:
            name:
              type: string
            targeting:
              type: object
              additionalProperties: true
            budget:
              type: object
              additionalProperties: true
            schedule:
              type: object
              additionalProperties: true
            placements:
              type: array
              items:
                type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: ad_set.create
      requires_credential: true
  - key: meta.ad_set.update
    name: Update Meta Ad Set
    description: Update a Meta ad set from an explicit change object.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &ad_set_update_input
      type: object
      additionalProperties: false
      required:
        - ad_set_ref
        - changes
      properties:
        ad_set_ref:
          type: string
        changes:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: ad_set.update
      requires_credential: true
  - key: meta.ad_creative.create
    name: Create Meta Ad Creative
    description: Create a Meta AdCreative object from explicit copy, asset refs, and destination metadata.
    provider: meta-ads
    capability: creative-operations
    risk_level: write
    input_schema: &creative_input
      type: object
      additionalProperties: false
      required:
        - account_ref
        - creative
      properties:
        account_ref:
          type: string
        creative:
          type: object
          additionalProperties: true
          required:
            - name
          properties:
            name:
              type: string
            text:
              type: object
              additionalProperties: true
            asset_refs:
              type: array
              items:
                type: string
            destination:
              type: object
              additionalProperties: true
            review_notes:
              type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: ad_creative.create
      requires_credential: true
  - key: meta.asset.upload
    name: Upload Meta Asset
    description: Upload or register a Meta creative asset from safe asset refs before AdCreative creation.
    provider: meta-ads
    capability: creative-operations
    risk_level: write
    input_schema: &asset_upload_input
      type: object
      additionalProperties: false
      required:
        - account_ref
        - asset
      properties:
        account_ref:
          type: string
        asset:
          type: object
          additionalProperties: true
          properties:
            asset_ref:
              type: string
            media_type:
              type: string
            usage:
              type: string
            review_notes:
              type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      execution_mode: deferred-asset-upload
      deferred_reason: Meta asset upload needs daemon artifact retrieval and multipart upload support.
  - key: meta.ad.create
    name: Create Meta Ad
    description: Create a Meta ad by connecting an ad set ref and creative ref.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &ad_input
      type: object
      additionalProperties: false
      required:
        - account_ref
        - ad_set_ref
        - creative_ref
        - ad
      properties:
        account_ref:
          type: string
        ad_set_ref:
          type: string
        creative_ref:
          type: string
        ad:
          type: object
          additionalProperties: true
          required:
            - name
          properties:
            name:
              type: string
            status:
              type: string
            tracking:
              type: object
              additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: ad.create
      requires_credential: true
  - key: meta.ad.update
    name: Update Meta Ad
    description: Update a Meta ad from an explicit change object.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &ad_update_input
      type: object
      additionalProperties: false
      required:
        - ad_ref
        - changes
      properties:
        ad_ref:
          type: string
        changes:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: ad.update
      requires_credential: true
  - key: meta.insights.fetch
    name: Fetch Meta Insights
    description: Fetch a bounded Meta performance snapshot for an agent-selected scope.
    provider: meta-ads
    capability: media-measurement
    risk_level: read
    input_schema: &meta_insights_input
      type: object
      additionalProperties: false
      required:
        - scope_ref
        - fields
      properties:
        scope_ref:
          type: string
        fields:
          type: array
          minItems: 1
          items:
            type: string
        level:
          type: string
        date_preset:
          type: string
        time_increment:
          type: string
        limit:
          type: integer
        after:
          type: string
        time_range:
          type: object
          additionalProperties: true
        breakdowns:
          type: array
          items:
            type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: insights.fetch
      requires_credential: true
  - key: meta.campaign_budget.update
    name: Update Meta Campaign Budget
    description: Apply an explicit campaign-budget-optimization budget change to a Meta campaign reference.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &budget_update_input
      type: object
      additionalProperties: false
      required:
        - campaign_ref
        - budget
      properties:
        campaign_ref:
          type: string
        budget:
          type: object
          additionalProperties: true
        reason:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: campaign_budget.update
      requires_credential: true
  - key: meta.ad_set_budget.update
    name: Update Meta Ad Set Budget
    description: Apply an explicit ad set budget change to a Meta ad set reference.
    provider: meta-ads
    capability: campaign-management
    risk_level: write
    input_schema: &ad_set_budget_update_input
      type: object
      additionalProperties: false
      required:
        - ad_set_ref
        - budget
      properties:
        ad_set_ref:
          type: string
        budget:
          type: object
          additionalProperties: true
        reason:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: ad_set_budget.update
      requires_credential: true
  - key: meta.conversions.send
    name: Send Meta Conversion Events
    description: Send approved Meta conversion events that are already normalized for the Conversions API.
    provider: meta-ads
    capability: media-measurement
    risk_level: write
    input_schema: &conversion_event_input
      type: object
      additionalProperties: false
      required:
        - dataset_ref
        - events
      properties:
        dataset_ref:
          type: string
        events:
          type: array
          items:
            type: object
            additionalProperties: true
            required:
              - event_name
              - event_time
              - action_source
              - user_data
            properties:
              event_name:
                type: string
              event_time:
                type: integer
              action_source:
                type: string
              user_data:
                type: object
                additionalProperties: true
        test_event_code:
          type: string
        consent:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: meta-ads
      operation: conversions.send
      requires_credential: true
  - key: google.customer.list
    name: List Google Ads Customers
    description: Read accessible Google Ads customer metadata for the configured credential.
    provider: google-ads
    capability: campaign-management
    risk_level: read
    input_schema: *account_list_input
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: customer.list
      requires_credential: true
  - key: google.campaign_budget.create
    name: Create Google Campaign Budget
    description: Create a Google Ads campaign budget from explicit budget fields and safe customer refs.
    provider: google-ads
    capability: campaign-management
    risk_level: write
    input_schema: &google_campaign_budget_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - budget
      properties:
        customer_ref:
          type: string
        budget:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: campaign_budget.create
      requires_credential: true
  - key: google.campaign_budget.update
    name: Update Google Campaign Budget
    description: Update a Google Ads campaign budget from explicit budget changes.
    provider: google-ads
    capability: campaign-management
    risk_level: write
    input_schema: &google_campaign_budget_update_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - changes
        - update_mask
      properties:
        customer_ref:
          type: string
        campaign_budget_ref:
          type: string
        changes:
          type: object
          additionalProperties: true
        update_mask:
          type: string
        reason:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: campaign_budget.update
      requires_credential: true
  - key: google.campaign.create
    name: Create Google Campaign
    description: Create a Google Ads campaign from an explicit campaign object and campaign budget ref.
    provider: google-ads
    capability: campaign-management
    risk_level: write
    input_schema: &google_campaign_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - campaign_budget_ref
        - campaign
      properties:
        customer_ref:
          type: string
        campaign_budget_ref:
          type: string
        campaign:
          type: object
          additionalProperties: true
          required:
            - name
            - advertisingChannelType
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: campaign.create
      requires_credential: true
  - key: google.ad_group.create
    name: Create Google Ad Group
    description: Create a Google Ads ad group from explicit bidding, targeting, and status fields.
    provider: google-ads
    capability: campaign-management
    risk_level: write
    input_schema: &google_ad_group_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - campaign_ref
        - ad_group
      properties:
        customer_ref:
          type: string
        campaign_ref:
          type: string
        ad_group:
          type: object
          additionalProperties: true
          required:
            - name
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: ad_group.create
      requires_credential: true
  - key: google.asset.create
    name: Create Google Asset
    description: Create a Google Ads asset from an explicit provider-native asset object.
    provider: google-ads
    capability: creative-operations
    risk_level: write
    input_schema: &google_asset_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - asset
      properties:
        customer_ref:
          type: string
        asset:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: asset.create
      requires_credential: true
  - key: google.ad_group_ad.create
    name: Create Google Ad Group Ad
    description: Create a Google Ads ad group ad from explicit ad content and safe asset refs.
    provider: google-ads
    capability: campaign-management
    risk_level: write
    input_schema: &google_ad_group_ad_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - ad_group_ref
        - ad
      properties:
        customer_ref:
          type: string
        ad_group_ref:
          type: string
        ad:
          type: object
          additionalProperties: true
          required:
            - name
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: ad_group_ad.create
      requires_credential: true
  - key: google.report.search
    name: Search Google Ads Report
    description: Run a bounded Google Ads reporting search from explicit GAQL or query parts and paging controls.
    provider: google-ads
    capability: media-measurement
    risk_level: read
    input_schema: &google_report_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - query
      properties:
        customer_ref:
          type: string
        query:
          type: string
        page_token:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: report.search
      requires_credential: true
  - key: google.conversion_action.create
    name: Create Google Conversion Action
    description: Create a Google Ads conversion action from explicit tracking and attribution fields.
    provider: google-ads
    capability: media-measurement
    risk_level: write
    input_schema: &google_conversion_action_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - conversion_action
      properties:
        customer_ref:
          type: string
        conversion_action:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: conversion_action.create
      requires_credential: true
  - key: google.conversion_upload.clicks
    name: Upload Google Click Conversions
    description: Upload approved Google Ads click conversions from safe event refs and daemon-side PII handling.
    provider: google-ads
    capability: media-measurement
    risk_level: write
    input_schema: &google_conversion_upload_input
      type: object
      additionalProperties: false
      required:
        - customer_ref
        - conversions
      properties:
        customer_ref:
          type: string
        conversions:
          type: array
          items:
            type: object
            additionalProperties: true
        partial_failure:
          type: boolean
        debug_enabled:
          type: boolean
        job_id:
          type: integer
        validate_only:
          type: boolean
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      connector: google-ads
      operation: conversion_upload.clicks
      requires_credential: true
  - key: outbrain.campaign.create
    name: Create Outbrain Campaign
    description: Create an Outbrain campaign from an explicit marketer-scoped campaign object.
    provider: outbrain
    capability: campaign-management
    risk_level: write
    input_schema: &outbrain_campaign_create_input
      type: object
      additionalProperties: false
      required:
        - marketer_ref
        - campaign
      properties:
        marketer_ref:
          type: string
        campaign:
          type: object
          additionalProperties: true
          required:
            - name
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      execution_mode: deferred-partner-api
      deferred_reason: Outbrain endpoint-level campaign and report contracts are partner/API-doc gated; only auth/token lifecycle is public.
  - key: outbrain.campaign.update
    name: Update Outbrain Campaign
    description: Update an Outbrain campaign from an explicit change object.
    provider: outbrain
    capability: campaign-management
    risk_level: write
    input_schema: &outbrain_campaign_update_input
      type: object
      additionalProperties: false
      required:
        - marketer_ref
        - campaign_ref
        - changes
      properties:
        marketer_ref:
          type: string
        campaign_ref:
          type: string
        changes:
          type: object
          additionalProperties: true
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      execution_mode: deferred-partner-api
      deferred_reason: Outbrain endpoint-level campaign and report contracts are partner/API-doc gated; only auth/token lifecycle is public.
  - key: outbrain.campaign.pause
    name: Pause Outbrain Campaign
    description: Pause an Outbrain campaign by safe campaign reference.
    provider: outbrain
    capability: campaign-management
    risk_level: write
    input_schema: &outbrain_campaign_ref_input
      type: object
      additionalProperties: false
      required:
        - marketer_ref
        - campaign_ref
      properties:
        marketer_ref:
          type: string
        campaign_ref:
          type: string
        reason:
          type: string
    output_schema: *object_schema
    config:
      schema_version: stackos.action.v1
      execution_mode: deferred-partner-api
