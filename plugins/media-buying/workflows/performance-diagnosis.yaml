schema_version: stackos.workflow-template.v1
key: media-buying.performance-diagnosis
name: Media Buying Performance Diagnosis
version: 0.1.0
description: Reusable template for diagnosing paid media performance using bounded snapshots, resource history, learnings, and optional provider reads.
domain: media-buying
owner:
  team: StackOS
when_to_use:
  - A campaign, channel, creative set, or audience needs a performance review.
  - The agent should retrieve only relevant historical fields before diagnosing.
when_not_to_use:
  - The operator already approved a budget or campaign mutation and only needs execution.
agent_requirements:
  - role: media-performance-diagnosis
    requirement: required
    agent_preset_ref: media-buying.workflow.performance-diagnosis
    purpose: Diagnose performance from available evidence while naming live-data and confidence limits.
  - role: delivery-reviewer
    requirement: recommended
    agent_preset_ref: stackos.sdlc.delivery-reviewer
    purpose: Review measurement freshness, provider-contract assumptions, and any proposed risky follow-up.
skill_requirements:
  - skill_ref: stackos:stackos
    requirement: recommended
    purpose: Teach the main agent how to operate StackOS MCP, workflow templates, run plans, tracker tasks/tickets, dependencies, and evidence.
    setup_notes:
      - Use this skill before planning or executing the workflow when the host supports skills.
      - Work through the existing tracker; create or update tasks/tickets rather than keeping workflow state only in chat.
inputs:
  - key: goal
    name: Goal
    type: string
    required: true
  - key: review_scope
    name: Review Scope
    type: object
    required: true
  - key: review_window
    name: Review Window
    type: object
    required: false
  - key: metric_targets
    name: Metric Targets
    type: object
    required: false
context_requirements:
  - id: recent_performance
    source: resources
    purpose: Retrieve compact performance, campaign, creative, and budget context for the review scope.
    filters:
      plugin_slug: media-buying
      resource_keys:
        - performance-snapshot
        - campaign
        - ad-set
        - ad
        - creative
        - budget-change
    fields:
      - resource_key
      - title
      - status
      - data_json
      - updated_at
    max_items: 30
    return_mode: compact
  - id: related_learnings
    source: learnings
    purpose: Pull prior media lessons relevant to performance interpretation.
    filters:
      tags:
        - media-buying
        - performance
      statuses:
        - active
    fields:
      - statement
      - confidence
      - evidence_json
      - tags
    max_items: 15
    return_mode: compact
  - id: related_experiments
    source: experiments
    purpose: Read active or recently completed experiments that constrain interpretation.
    filters:
      domain: media-buying
      statuses:
        - planned
        - running
        - pending-decision
        - completed
    fields:
      - name
      - hypothesis
      - status
      - metric_targets_json
      - variants
    max_items: 15
    return_mode: compact
capability_requirements:
  - key: media-measurement
    required: true
    preferred_providers:
      - meta-ads
      - google-ads
      - taboola
      - custom-media-tool
auth_requirements:
  - key: meta_ads
    provider: meta-ads
    auth_type: oauth
    optional: true
  - key: google_ads
    provider: google-ads
    auth_type: oauth
    optional: true
  - key: taboola
    provider: taboola
    auth_type: oauth
    optional: true
action_contracts:
  - key: meta_insights
    action: meta.insights.fetch
    capability: media-measurement
    provider: meta-ads
    risk_level: read
    auth_ref: meta_ads
  - key: google_report
    action: google.report.search
    capability: media-measurement
    provider: google-ads
    risk_level: read
    auth_ref: google_ads
  - key: taboola_report
    action: taboola.report.fetch
    capability: media-measurement
    provider: taboola
    risk_level: read
    auth_ref: taboola
  - key: custom_media_performance
    action: custom_media.performance.fetch
    capability: media-measurement
    provider: custom-media-tool
    risk_level: read
resource_contracts:
  - key: performance_snapshots
    resource: performance-snapshot
    purpose: Store imported or summarized metric snapshots used in the diagnosis.
  - key: campaigns
    resource: campaign
    purpose: Store campaign context and follow-up notes.
  - key: creatives
    resource: creative
    purpose: Store creative interpretation notes and candidate follow-up refs.
  - key: budget_changes
    resource: budget-change
    purpose: Store proposed budget follow-ups without applying them automatically.
policies:
  - key: read_only_by_default
    kind: execution
    description: Diagnosis should read, summarize, and record recommendations; external writes belong in a separate approved run.
  - key: no_secret_exposure
    kind: auth
    description: Provider credentials remain daemon-side during optional insight fetches.
approval_gates:
  - key: cost_review
    description: Review expected provider cost before high-volume insight retrieval.
    required_when: estimated_cost_above_project_threshold
steps:
  - id: orient
    title: Orient From Performance Context
    purpose: Read the review scope, metric targets, recent snapshots, related learnings, and active experiments.
    input_refs:
      - goal
      - review_scope
      - review_window
      - metric_targets
    context_refs:
      - recent_performance
      - related_learnings
      - related_experiments
    policy_refs:
      - read_only_by_default
    output_refs:
      - diagnosis_summary
  - id: fetch_additional_metrics
    title: Fetch Additional Metrics
    purpose: Execute only approved read actions that the concrete run plan grants for missing evidence.
    action_refs:
      - meta_insights
      - google_report
      - taboola_report
      - custom_media_performance
    policy_refs:
      - no_secret_exposure
    approval_refs:
      - cost_review
    depends_on:
      - orient
    output_refs:
      - metric_gap_report
  - id: diagnose_drivers
    title: Diagnose Drivers
    purpose: Compare evidence against targets and separate likely channel, audience, creative, landing page, and budget drivers.
    resource_refs:
      - performance_snapshots
      - campaigns
      - creatives
    depends_on:
      - fetch_additional_metrics
    output_refs:
      - diagnosis_summary
  - id: record_followups
    title: Record Followups
    purpose: Store recommended follow-up resources, budget review notes, and learning candidates.
    resource_refs:
      - performance_snapshots
      - budget_changes
      - campaigns
      - creatives
    context_refs:
      - related_learnings
    depends_on:
      - diagnose_drivers
    output_refs:
      - followup_plan
outputs:
  - key: diagnosis_summary
    name: Diagnosis Summary
    type: object
    required: true
  - key: metric_gap_report
    name: Metric Gap Report
    type: object
  - key: followup_plan
    name: Followup Plan
    type: object
learning_hooks:
  - key: performance_learning
    prompt: Capture only durable performance lessons with metric evidence, scope, and dates.
    tags:
      - media-buying
      - performance
failure_handling:
  - If provider reads are unavailable, diagnose from stored snapshots and list missing evidence.
  - If evidence is stale or too sparse, return a metric gap report instead of inventing conclusions.
metadata:
  builtin: true
  run_mode: stackos_run_plan
